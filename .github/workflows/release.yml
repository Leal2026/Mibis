name: Publicar APK

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          name: Mibis ${{ github.ref_name }}
          body: Download gratuito do Mibis para Android. A doação via Pix é opcional.
          files: release/Mibis.apk
